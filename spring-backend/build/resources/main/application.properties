spring.application.name=ingressos

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ingressos_db}
spring.datasource.username=${DB_USER:ingressos}
spring.datasource.password=${DB_PASSWORD:ingressos123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Server
server.port=${SERVER_PORT:8090}

# JWT
api.security.token.secret=${JWT_SECRET:my-secret-jwt-key-change-me-in-production-please-use-strong-key}
api.security.token.expiration-hours=${JWT_EXPIRATION_HOURS:8}

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.org.hibernate.SQL=INFO
logging.level.org.springframework.security=INFO
